<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Pong Arena</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }
    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 560px;
      margin-bottom: 10px;
    }
    .ctrls {
      display: flex;
      gap: 6px;
    }
    .cb {
      background: #111122;
      border: 1px solid #222240;
      color: #555;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
      line-height: 1;
    }
    .cb:hover,
    .cb.on {
      border-color: #fff;
      color: #fff;
    }
    #btnRules {
      font-weight: bold;
      font-style: italic;
      font-size: 13px;
      padding: 5px 12px;
    }
    #btnMouse {
      font-size: 13px;
      padding: 5px 9px;
    }
    #tip {
      font-size: 11px;
      color: #333;
      flex: 1;
      text-align: center;
    }
    canvas {
      display: block;
      border: 1px solid #1e1e3a;
      border-radius: 6px;
    }
    .ov {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .ov.hide {
      display: none;
    }
    .ov h1 {
      font-size: 30px;
      font-weight: 700;
    }
    .ov p {
      font-size: 13px;
      color: #aaa;
    }
    .ov small {
      font-size: 11px;
      color: #444;
    }
    .rules-text {
      font-size: 12px;
      color: #ccc;
      line-height: 1.6;
      max-width: 360px;
      text-align: left;
      white-space: pre-wrap;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .btn {
      background: #fff;
      color: #0a0a12;
      border: none;
      padding: 11px 26px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:hover {
      opacity: .85;
    }
    .btn.ghost {
      background: transparent;
      border: 1px solid #333;
      color: #555;
    }
    .btn.ghost:hover {
      border-color: #fff;
      color: #fff;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div class="ctrls">
      <button class="cb" id="btnPause">⏸</button>
      <button class="cb" id="btnRestart">↺</button>
      <button class="cb on" id="btnLang">FR</button>
      <button class="cb" id="btnRules" title="Règles">i</button>
      <!-- Nouveau bouton souris -->
      <button class="cb" id="btnMouse" title="Contrôle souris">🖱️</button>
    </div>
    <div id="tip"></div>
  </div>

  <canvas id="c" width="560" height="360"></canvas>

  <div class="ov" id="ovMain">
    <div style="font-size:38px">🏓</div>
    <h1 id="ovTitle">Pong Arena</h1>
    <p id="ovSub">Toi vs IA · Premier à 7 points</p>
    <small id="ovHint">W/S ou ↑/↓ pour déplacer</small>
    <div class="row"><button class="btn" id="btnPlay">Jouer</button></div>
  </div>

  <div class="ov hide" id="ovPause">
    <div style="font-size:36px">⏸</div>
    <h1 id="ptitle">Pause</h1>
    <small id="phint">P pour reprendre</small>
    <div class="row">
      <button class="btn" id="btnResume">Reprendre</button>
      <button class="btn ghost" id="btnRestart2">Recommencer</button>
    </div>
  </div>

  <div class="ov hide" id="ovRules">
    <div style="font-size:36px">📋</div>
    <h1 id="rtitle">Règles du jeu</h1>
    <div class="rules-text" id="rulesContent"></div>
    <div class="row">
      <button class="btn" id="btnCloseRules">Fermer</button>
    </div>
  </div>

  <script>
    const TX = {
      FR: {
        tip: 'W/S ou ↑/↓ pour jouer · P = Pause',
        tipMouse: 'Déplace la souris sur le canvas · P = Pause',
        pause: 'P pour reprendre',
        resume: 'Reprendre',
        restart: 'Recommencer',
        play: 'Jouer',
        sub: 'Toi vs IA · Premier à 7 points',
        hint: 'W/S ou ↑/↓ pour déplacer',
        win: '🏆 Victoire !',
        lose: '💀 Défaite',
        gameOver: 'Score final',
        rulesTitle: 'Règles du jeu',
        rulesText: [
          '🎯 But du jeu',
          'Marquer 7 points avant l\'IA.',
          '',
          '🕹️ Commandes',
          '• W / ↑ : Déplacer la raquette vers le haut',
          '• S / ↓ : Déplacer la raquette vers le bas',
          '• P : Mettre en pause / Reprendre',
          '• 🖱️ : Activer le contrôle à la souris',
          '',
          '💡 Astuce',
          'Plus la balle frappe près du bord de la raquette, plus son angle est prononcé.',
          'La vitesse augmente légèrement à chaque échange.'
        ].join('\n'),
        close: 'Fermer'
      },
      EN: {
        tip: 'W/S or ↑/↓ to play · P = Pause',
        tipMouse: 'Move mouse over canvas · P = Pause',
        pause: 'Press P to resume',
        resume: 'Resume',
        restart: 'Restart',
        play: 'Play',
        sub: 'You vs AI · First to 7 points',
        hint: 'W/S or ↑/↓ to move',
        win: '🏆 You Win!',
        lose: '💀 You Lose',
        gameOver: 'Final score',
        rulesTitle: 'Game Rules',
        rulesText: [
          '🎯 Goal',
          'Score 7 points before the AI.',
          '',
          '🕹️ Controls',
          '• W / ↑ : Move paddle up',
          '• S / ↓ : Move paddle down',
          '• P : Pause / Resume',
          '• 🖱️ : Enable mouse control',
          '',
          '💡 Tip',
          'The farther from the center you hit, the sharper the angle.',
          'Speed increases slightly with each hit.'
        ].join('\n'),
        close: 'Close'
      }
    };

    let lg = 'FR';
    function t(k) { return TX[lg][k]; }

    function applyLang() {
      document.getElementById('btnLang').textContent = lg;
      document.getElementById('ovSub').textContent = t('sub');
      document.getElementById('ovHint').textContent = t('hint');
      document.getElementById('phint').textContent = t('pause');
      document.getElementById('btnResume').textContent = t('resume');
      document.getElementById('btnRestart2').textContent = t('restart');
      document.getElementById('btnPlay').textContent = t('play');
      document.getElementById('ptitle').textContent = 'Pause';
      if (alive) {
        document.getElementById('tip').textContent = mouseControl ? t('tipMouse') : t('tip');
      }
      document.getElementById('rtitle').textContent = t('rulesTitle');
      document.getElementById('rulesContent').textContent = t('rulesText');
      document.getElementById('btnCloseRules').textContent = t('close');
    }

    document.getElementById('btnLang').addEventListener('click', () => {
      lg = lg === 'FR' ? 'EN' : 'FR';
      applyLang();
    });

    const C = document.getElementById('c');
    const ctx = C.getContext('2d');
    const W = 560, H = 360, PW = 12, PH = 72, BR = 8, WIN = 7;
    let player, ai, ball, sP, sA;
    let alive = false, paused = false;
    const keys = {};

    // ----- Contrôle à la souris -----
    let mouseControl = false;          // true = pilotage souris actif
    let mouseY = H / 2;               // position Y relative au canvas

    function init() {
      player = { x: 18, y: H / 2 - PH / 2 };
      ai     = { x: W - 18 - PW, y: H / 2 - PH / 2 };
      ball = {
        x: W / 2, y: H / 2,
        vx: 4.5 * (Math.random() > .5 ? 1 : -1),
        vy: (Math.random() * 3 + 2) * (Math.random() > .5 ? 1 : -1)
      };
      sP = 0; sA = 0;
      alive = false;
      paused = false;
      mouseY = H / 2;   // centre par défaut
      render();
    }

    function launch() {
      alive = true;
      document.getElementById('tip').textContent = mouseControl ? t('tipMouse') : t('tip');
    }

    function resetBall(dir) {
      ball = {
        x: W / 2, y: H / 2,
        vx: 4.5 * dir,
        vy: (Math.random() * 3 + 2) * (Math.random() > .5 ? 1 : -1)
      };
      alive = false;
      setTimeout(() => { alive = true; }, 700);
    }

    function update() {
      if (!alive || paused) return;

      // ----- Mouvement du joueur (clavier ou souris) -----
      const spd = 6;
      if (mouseControl) {
        // Pilotage à la souris : la raquette suit le curseur
        player.y = Math.min(H - PH, Math.max(0, mouseY - PH / 2));
      } else {
        // Pilotage clavier
        if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y = Math.max(0, player.y - spd);
        if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y = Math.min(H - PH, player.y + spd);
      }

      // ----- IA -----
      const aiSpd = 3.8 + (sP + sA) * 0.12;
      const ac = ai.y + PH / 2;
      if (ac < ball.y - 6) ai.y = Math.min(H - PH, ai.y + aiSpd);
      else if (ac > ball.y + 6) ai.y = Math.max(0, ai.y - aiSpd);

      // ----- Balle -----
      ball.x += ball.vx; ball.y += ball.vy;
      if (ball.y - BR < 0) { ball.y = BR; ball.vy = Math.abs(ball.vy); }
      if (ball.y + BR > H) { ball.y = H - BR; ball.vy = -Math.abs(ball.vy); }

      // Collision joueur
      if (ball.x - BR < player.x + PW && ball.x + BR > player.x && ball.y > player.y && ball.y < player.y + PH && ball.vx < 0) {
        ball.vx = Math.min(11, Math.abs(ball.vx) * 1.06);
        ball.vy = ((ball.y - (player.y + PH / 2)) / (PH / 2)) * 6;
        ball.x = player.x + PW + BR;
      }
      // Collision IA
      if (ball.x + BR > ai.x && ball.x - BR < ai.x + PW && ball.y > ai.y && ball.y < ai.y + PH && ball.vx > 0) {
        ball.vx = -Math.min(11, Math.abs(ball.vx) * 1.06);
        ball.vy = ((ball.y - (ai.y + PH / 2)) / (PH / 2)) * 6;
        ball.x = ai.x - BR;
      }

      if (ball.x < 0) { sA++; chk(-1); }
      if (ball.x > W) { sP++; chk(1); }
    }

    function chk(dir) {
      if (sP >= WIN || sA >= WIN) gameover();
      else resetBall(dir);
    }

    function gameover() {
      alive = false;
      const won = sP > sA;
      const finalScore = sP * 100 + (7 - sA) * 10;
      window.parent.postMessage({
        type: 'GAME_OVER', score: finalScore,
        gameSlug: 'pong-arena', duration: 0
      }, '*');
      document.getElementById('ovTitle').textContent = won ? t('win') : t('lose');
      document.getElementById('ovSub').textContent = `${sP} — ${sA}  ·  ${t('gameOver')} : ${finalScore}`;
      document.getElementById('btnPlay').textContent = t('restart');
      document.getElementById('ovMain').classList.remove('hide');
    }

    function togglePause() {
      if (!document.getElementById('ovRules').classList.contains('hide')) return;
      if (!alive && !paused) return;
      paused = !paused;
      document.getElementById('btnPause').textContent = paused ? '▶' : '⏸';
      document.getElementById('ovPause').classList.toggle('hide', !paused);
    }

    function toggleRules() {
      const rulesOverlay = document.getElementById('ovRules');
      const opening = rulesOverlay.classList.contains('hide');
      if (opening) {
        if (alive && !paused) {
          paused = true;
          document.getElementById('btnPause').textContent = '▶';
          document.getElementById('ovPause').classList.add('hide');
        }
      }
      rulesOverlay.classList.toggle('hide');
    }

    // ----- Activation / désactivation du contrôle souris -----
    function toggleMouseControl() {
      mouseControl = !mouseControl;
      const btn = document.getElementById('btnMouse');
      // Applique la classe .on quand actif
      if (mouseControl) {
        btn.classList.add('on');
        // Mise à jour du message d'aide
        if (alive) document.getElementById('tip').textContent = t('tipMouse');
      } else {
        btn.classList.remove('on');
        if (alive) document.getElementById('tip').textContent = t('tip');
      }
      // Recentre la souris virtuelle au milieu du canvas
      mouseY = H / 2;
    }

    function doRestart() {
      document.getElementById('ovMain').classList.add('hide');
      document.getElementById('ovPause').classList.add('hide');
      document.getElementById('btnPause').textContent = '⏸';
      init();
      launch();
    }

    function rr(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.lineTo(x + w - r, y);
      c.arcTo(x + w, y, x + w, y + r, r);
      c.lineTo(x + w, y + h - r);
      c.arcTo(x + w, y + h, x + w - r, y + h, r);
      c.lineTo(x + r, y + h);
      c.arcTo(x, y + h, x, y + h - r, r);
      c.lineTo(x, y + r);
      c.arcTo(x, y, x + r, y, r);
      c.closePath();
      c.fill();
    }

    function render() {
      ctx.fillStyle = '#0a0a12'; ctx.fillRect(0, 0, W, H);
      ctx.setLineDash([10, 10]);
      ctx.strokeStyle = 'rgba(255,255,255,.07)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.font = 'bold 48px Courier New'; ctx.textAlign = 'center';
      ctx.fillText(sP, W / 2 - 70, 58); ctx.fillText(sA, W / 2 + 70, 58);
      ctx.fillStyle = '#fff';
      rr(ctx, player.x, player.y, PW, PH, 6); rr(ctx, ai.x, ai.y, PW, PH, 6);
      ctx.shadowColor = '#fff'; ctx.shadowBlur = 14;
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ball.x, ball.y, BR, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // ----- Événements souris -----
    C.addEventListener('mousemove', (e) => {
      const rect = C.getBoundingClientRect();
      // Position Y relative au canvas (0 = haut)
      mouseY = e.clientY - rect.top;
      // On ne clamp pas ici, car update() le fera avec player.y
    });

    // ----- Clavier -----
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        togglePause();
      }
      if ((e.key === ' ' || e.key === 'Enter') && !alive && !paused) {
        e.preventDefault();
        document.getElementById('ovMain').classList.add('hide');
        init();
        launch();
      }
    });

    document.addEventListener('keyup', e => delete keys[e.key]);

    // ----- Boutons -----
    document.getElementById('btnPause').addEventListener('click', togglePause);
    document.getElementById('btnResume').addEventListener('click', togglePause);
    document.getElementById('btnRestart').addEventListener('click', doRestart);
    document.getElementById('btnRestart2').addEventListener('click', doRestart);
    document.getElementById('btnPlay').addEventListener('click', () => {
      document.getElementById('ovMain').classList.add('hide');
      init();
      launch();
    });
    document.getElementById('btnRules').addEventListener('click', toggleRules);
    document.getElementById('btnCloseRules').addEventListener('click', toggleRules);
    document.getElementById('btnMouse').addEventListener('click', toggleMouseControl);

    function loop() { update(); render(); requestAnimationFrame(loop); }

    init();
    applyLang();
    loop();
  </script>
</body>
</html>
